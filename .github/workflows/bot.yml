name: Bot poll (Telegram)

# Fast Telegram command dispatch. Runs every minute during expanded market
# hours so /add, /remove, /list, /help feel near-real-time (~60-90s).
# Heavy work (screener, dashboard, Pages deploy) stays in refresh.yml.

on:
  schedule:
    # Every minute, Mon-Fri 12:00-23:00 UTC. That's roughly 7am-7pm ET in
    # both DST regimes — covers pre-market through after-hours portfolio
    # tweaks. Outside this window commands wait until the next session.
    - cron: "* 12-23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write  # commits state.enc back to main

concurrency:
  # Shared with refresh.yml — only one of them touches state.enc at a time.
  group: state-update
  cancel-in-progress: false

jobs:
  poll:
    # Only run on main. Branch test runs via workflow_dispatch are no-ops
    # so they can't corrupt prod state.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Trading Tool"
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PORTFOLIO_ENCRYPTION_KEY: ${{ secrets.PORTFOLIO_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "Trading Tool/requirements.txt"

      - name: Install minimal deps
        # Only what bot-only needs: pandas (state CSV read), cryptography
        # (Fernet). yfinance/pyarrow/numpy are pulled in transitively by
        # screener imports but no actual data fetch happens.
        run: pip install -r requirements.txt

      - name: Bot poll
        run: python run.py --bot-only

      - name: Commit state.enc back to main (if changed)
        run: |
          if [ ! -f state.enc ]; then
            echo "No state.enc yet — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.enc
          if git diff --cached --quiet; then
            echo "state.enc unchanged — nothing to commit"
            exit 0
          fi
          # Pull-rebase first in case the screener workflow pushed since checkout
          git pull --rebase origin main || {
            echo "rebase failed — abandoning this tick; next run will retry"
            exit 0
          }
          git commit -m "bot: poll update [skip ci]"
          git push origin HEAD:main || {
            echo "push failed (likely race with screener) — next tick will retry"
            exit 0
          }
