name: Bot poll (Telegram)

# Fast Telegram command dispatch. ORIGINALLY ran every minute during market
# hours. RETIRED 2026-06-05 — Fly.io now runs the bot poller every 60s.
#
# Why retired: Telegram delivers each update to the FIRST poller that asks.
# When this workflow + Fly's loop.py both polled the same bot token, they
# raced for updates — half went to Fly's /data/state.enc, half went to the
# repo's state.enc, and /list could never see all positions consistently.
#
# Workflow file kept around for manual fallback (workflow_dispatch). To
# rollback to GitHub Actions: uncomment the schedule block, stop Fly with
# `fly apps stop trade-tool`, and the next tick will pick up cleanly. See
# DEPLOY.md for the full rollback procedure.

on:
  # schedule:
  #   - cron: "* 12-23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write  # commits state.enc back to main

concurrency:
  # Shared with refresh.yml — only one of them touches state.enc at a time.
  group: state-update
  cancel-in-progress: false

jobs:
  poll:
    # Only run on main. Branch test runs via workflow_dispatch are no-ops
    # so they can't corrupt prod state.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Trading Tool"
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PORTFOLIO_ENCRYPTION_KEY: ${{ secrets.PORTFOLIO_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "Trading Tool/requirements.txt"

      - name: Install minimal deps
        # Only what bot-only needs: pandas (state CSV read), cryptography
        # (Fernet). yfinance/pyarrow/numpy are pulled in transitively by
        # screener imports but no actual data fetch happens.
        run: pip install -r requirements.txt

      - name: Bot poll
        run: python run.py --bot-only

      - name: Commit state.enc back to main (if changed)
        run: |
          if [ ! -f state.enc ]; then
            echo "No state.enc yet — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.enc
          if git diff --cached --quiet; then
            echo "state.enc unchanged — nothing to commit"
            exit 0
          fi
          # Pull-rebase first in case the screener workflow pushed since checkout
          git pull --rebase origin main || {
            echo "rebase failed — abandoning this tick; next run will retry"
            exit 0
          }
          git commit -m "bot: poll update [skip ci]"
          git push origin HEAD:main || {
            echo "push failed (likely race with screener) — next tick will retry"
            exit 0
          }
