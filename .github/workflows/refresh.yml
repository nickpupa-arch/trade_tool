name: Refresh dashboard

on:
  # Every 15 min during US market hours (Mon-Fri, 13:00-22:00 UTC).
  # 13:00 UTC = 9:00 ET (EDT) / 8:00 ET (EST). Covers both DST regimes.
  schedule:
    - cron: "*/15 13-22 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Trading Tool/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Trading Tool"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "Trading Tool/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the screener
        run: python run.py --no-open --out _site/dashboard.html

      - name: Copy static assets
        run: |
          cp how-to.html      _site/
          cp manifest.webmanifest _site/
          cp sw.js            _site/
          cp icon.svg         _site/
          # Landing page redirects to the dashboard
          cat > _site/index.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=dashboard.html">
          <link rel="canonical" href="dashboard.html">
          <title>Trading Tool</title>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "Trading Tool/_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
