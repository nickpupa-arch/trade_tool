name: Refresh dashboard

on:
  # GitHub's schedule trigger is "best effort" — drops most runs under load.
  # Kept as a fallback. The PRIMARY trigger is repository_dispatch fired by
  # an external scheduler (e.g. cron-job.org), which has reliable timing.
  schedule:
    - cron: "*/15 13-22 * * 1-5"
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-dashboard]
  push:
    branches: [main]
    paths:
      - "Trading Tool/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write   # needs write so the workflow can commit state.enc back to main
  pages: write
  id-token: write

concurrency:
  # Shared with bot.yml so the two workflows serialize on state.enc updates
  # and Pages deploys. cancel-in-progress: false → the 1-min bot waits for
  # the 15-min screener instead of getting cancelled mid-flight.
  group: state-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Trading Tool"
    outputs:
      # 'true' only when a fresh dashboard was produced. When Yahoo is down,
      # run.py exits 0 without writing _site/, so this stays 'false' and the
      # deploy/asset/upload steps skip — keeping the last good deploy live.
      built: ${{ steps.screener.outputs.built }}
    env:
      # Set as GitHub repo secrets. Bot/notify steps no-op if any are unset.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PORTFOLIO_ENCRYPTION_KEY: ${{ secrets.PORTFOLIO_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "Trading Tool/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the screener (with bot + alerts when configured)
        id: screener
        run: |
          # Capture output so a failure can publish its log (the only CI-log
          # channel readable from the agent). Preserve the real exit code.
          set +e
          python run.py --no-open --notify --out _site/dashboard.html 2>&1 | tee /tmp/run.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ -f _site/dashboard.html ]; then
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Data fetch unavailable — no fresh dashboard. Skipping deploy; last good deploy stays live."
          fi
          if [ "$rc" != "0" ]; then
            mkdir -p _diag
            tail -c 80000 /tmp/run.log > _diag/last_failure.log
            echo "$rc" > _diag/last_exit_code.txt
            date -u +"%Y-%m-%dT%H:%M:%SZ" > _diag/last_failure_at.txt
          fi
          exit $rc

      - name: Publish failure diagnostics
        # ONLY on failure — keeps successful runs from spamming commits. The
        # captured log lands on main for inspection. [skip ci] avoids retrigger.
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          [ -f _diag/last_failure.log ] || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f _diag/last_failure.log _diag/last_exit_code.txt _diag/last_failure_at.txt 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "ci: failure diagnostics [skip ci]" || exit 0
          for attempt in 1 2 3; do
            git push origin HEAD:main && exit 0
            git pull --rebase -X ours origin main || git rebase --abort || true
            sleep $((attempt * 2))
          done
          exit 0

      - name: Verify no portfolio data leaked into _site/
        # Defense-in-depth: the Pages artifact must not contain any encrypted
        # blob or other portfolio-shaped file. Fail loudly if it does.
        if: steps.screener.outputs.built == 'true'
        run: |
          if find _site -maxdepth 3 \( -name "state*" -o -name "portfolio*" \) | grep -q .; then
            echo "ERROR: portfolio-shaped files found in _site/ — aborting deploy"
            find _site -maxdepth 3 \( -name "state*" -o -name "portfolio*" \)
            exit 1
          fi

      - name: Copy static assets
        if: steps.screener.outputs.built == 'true'
        run: |
          cp how-to.html      _site/
          cp manifest.webmanifest _site/
          cp sw.js            _site/
          cp icon.svg         _site/
          # Landing page redirects to the dashboard
          cat > _site/index.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=dashboard.html">
          <link rel="canonical" href="dashboard.html">
          <title>Trading Tool</title>
          HTML

      - name: Commit state.enc back to main (if changed)
        # state.enc is the Fernet-encrypted portfolio + bot state. Plaintext
        # never lands in the repo. Skip-ci on the message so this commit
        # doesn't retrigger the workflow. Only on main — branch test runs
        # via workflow_dispatch should not write to main's state.
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          if [ ! -f state.enc ]; then
            echo "No state.enc to commit — skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.enc
          if git diff --cached --quiet; then
            echo "state.enc unchanged — nothing to commit"
            exit 0
          fi
          # Commit first (no stash dance), then push with rebase-retry. state.enc
          # is a binary blob, so on a race with bot.yml we resolve conflicts with
          # -X ours (this run's freshly-computed state wins). State persistence is
          # a side-effect: it must NEVER fail the build, so every path exits 0.
          git commit -m "bot: update encrypted state [skip ci]" || {
            echo "nothing to commit after staging — skipping"
            exit 0
          }
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "state.enc pushed"
              exit 0
            fi
            echo "push rejected (race with bot.yml?) — rebasing and retrying ($attempt/3)"
            git pull --rebase -X ours origin main || git rebase --abort || true
            sleep $((attempt * 2))
          done
          echo "could not push state after 3 attempts — next tick will retry (non-fatal)"
          exit 0

      - uses: actions/upload-pages-artifact@v3
        # Only upload when we built a fresh dashboard on main. Branch test runs
        # and data-outage skips both stop short of Pages.
        if: github.ref == 'refs/heads/main' && steps.screener.outputs.built == 'true'
        with:
          path: "Trading Tool/_site"

  deploy:
    # Deploy only from main AND only when a fresh dashboard was built. On a
    # data-outage skip, built == 'false' so we keep the last good deploy live.
    if: github.ref == 'refs/heads/main' && needs.build.outputs.built == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
